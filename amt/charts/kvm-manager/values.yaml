global:
  registry:
    name: null
    imagePullSecrets:
      - name: ""

replicaCount: 1

image:
  repository: infra/kvm-manager
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # Image specific takes precedence
  # registry:
  #   name: null
  #   imagePullSecrets:
  #     - name: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "kvm-manager"

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: "orch-svc"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534

resources:
  limits:
    cpu: 400m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: infra-config-volume
    configMap:
      name: infra-config

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: infra-config-volume
    mountPath: "/etc/infra-config"
    readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}
extraEnv: []

serviceArgs:
  # Internal cluster DNS — kvm-manager runs in the same cluster as inventory and MPS
  inventoryAddress: "inventory.orch-infra.svc.cluster.local:50051"
  mpsAddress: "http://mps.orch-infra.svc.cluster.local:3000"
  oamServerAddress: "0.0.0.0:2379"
  reconcilePeriod: "1m"
  requestTimeout: "30s"
  # insecureGRPC: skip TLS for inventory gRPC — set false in production with client certs
  # TO DO: Remove not required flags to pass to inventory.
  insecureGRPC: "true"
  # traceURL: only used when tracing.enabled=true
  traceURL: ""

tracing:
  enabled: false

# TODO: Clean up metrics — kvm-manager has no KVM metrics instrumented.
# Remove this block, serviceMonitor.yaml, and the metrics port in service.yaml
metrics:
  enabled: false
  port: 8081
