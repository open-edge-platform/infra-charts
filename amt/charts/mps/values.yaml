---

global:
  registry:
    name: null
    imagePullSecrets:
      - name: ""

replicaCount: 1

image:
  repository: intel/oact-mps
  tag: latest
  pullPolicy: IfNotPresent

curlImage: 
  name: badouralix/curl-jq@sha256
  tag: fe8a5ee49f613495df3b57afa86b39f081bd1b3b9ed61248f46c3d3d7df56092
  pullPolicy: IfNotPresent

mps:
  commonName: 
  vault_url: "http://vault.orch-platform.svc:8200"
  vault_role: "orch-svc"
  secretpath: "secret/data"
  port: "4433"
  auth_enabled: "false"
  logLevel: "silly"

nameOverride: ""
fullnameOverride: "mps"

tenancyMiddleware:
  # Disabled for the nexus-replacement deployment: nexus-api-gw is gone, and
  # orch-cli now injects project context via /v1/projects/{name}/dm/... path
  # rewrites that the rewrite-mps Traefik middleware strips before forwarding
  # to the upstream service. The fallback resolveProjectUUID code in
  # multiTenancyMiddleware.js depends on NEXUS_API_URL pointing at the
  # deleted svc-iam-nexus-api-gw and would 401 every request.
  enabled: false
  nexusAPIURL: "http://svc-iam-nexus-api-gw.orch-iam.svc:8082"

# Long-running Vault token refresher.
# Replaces the previous CronJob (`*/50 * * * *`), which produced a 50/10/50/10 min
# gap pattern and could not guarantee a 40-min user session before MPS/RPS were
# rolled by Reloader. The refresher Deployment runs amt.sh in a sleep loop with
# an exact `intervalSeconds` cadence. See
# `edge-manageability-framework/design-proposals/adr-amt-token-vault-refresh.md`.
refresher:
  name: amt-vault-refresher
  # Spacing between two successful Vault token refreshes.
  # Must be < Vault token TTL (default 60 min) and provide enough headroom for
  # the longest user session expected against MPS/RPS.
  intervalSeconds: 3000
  # Liveness probe fails if /tmp/last_success has not been touched within this
  # window, causing kubelet to restart the pod and trigger an immediate refresh.
  livenessMaxAgeSeconds: 3300
  # Status ConfigMap that amt.sh PATCHes after each successful refresh.
  statusConfigMap: amt-vault-refresh-status

job:
  secretjob:
    name: amt-dbpassword-secret-job
    configmap: mps-db-configmap
rbac:
  role: amt-role
  role_binding: amt-rolebinding
  serviceaccount: orch-svc

reloader:
  # Create ClusterRole/ClusterRoleBinding for Reloader to watch secrets across namespaces
  # Set to true for MPS chart, false for RPS chart to avoid conflicts
  createRBAC: true

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534

service:
  type: ClusterIP
  ciraport: 4433
  webapiport: 3000

ingress:
  name: amt-api-mps

serviceAccount:
  enabled: true
  name: orch-svc

traefikReverseProxy:
  host:
    cira:
      name: ""
    webport:
      name: ""
  dnsname: 
  # -- enabled is a switch to turn on/off the Traefik reverse proxy resource; Traefik MUST be deployed to gateway-system ns before enabling it here.
  enabled: false 
  # -- gatewayNamespace specifies namespace of Traefik and related resources (e.g. k8s secret or tls option).
  gatewayNamespace: orch-gateway
  # -- secretName is name of k8s secret containing TLS server cert.
  secretName: tls-demo
  # -- matchRoute defines routing rules (e.g. Host(`http.sample.com`))
  matchRoute:
  # -- tlsOption is the name of the Traefik option for handling TLS or mTLS connections.
  tlsOption: gateway-tls

traefikApiGroup: "traefik.containo.us/v1alpha1"

podAnnotations:
  traffic.sidecar.istio.io/excludeInboundPorts: "4433"
  traffic.sidecar.istio.io/excludeOutboundPorts: "4433"


imagePullSecrets: {}

nodeSelector: {}

tolerations: []

affinity: {}

postgresql:
  image:
    name: postgres
    tag: 16.4
    pullPolicy: IfNotPresent
  type: "local"
  ssl: "false"
