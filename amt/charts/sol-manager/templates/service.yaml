---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sol-manager.fullname" . }}
  labels:
    {{- include "sol-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: sol-proxy
      port: {{ .Values.solProxy.port }}
      targetPort: sol-proxy
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
    {{- if .Values.serviceArgs.oamServerAddress }}
    {{- $oamservport := (splitList ":" .Values.serviceArgs.oamServerAddress) | last | atoi }}
    - name: oam
      port: {{ $oamservport }}
      targetPort: {{ $oamservport }}
      protocol: TCP
    {{- end }}
  selector:
    {{- include "sol-manager.selectorLabels" . | nindent 4 }}
